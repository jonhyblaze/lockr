name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: Go CLI (lockr)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Sync shared feedback data
        run: cp packages/core/feedback.json packages/cli-go/internal/password/feedback.json
      - run: go vet ./...
      - run: go test ./...

  web:
    name: Web (build + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # No committed lockfile (see .gitignore): a fresh install resolves the
      # correct platform-specific vite/rolldown native binary. Web deps are
      # pinned to exact versions, so this stays deterministic.
      - run: npm install
      - run: npm run typecheck --workspace @lockr/web
      - run: npm run build --workspace @lockr/web
