name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: Go CLI (lockr)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Sync shared feedback data
        run: cp packages/core/feedback.json packages/cli-go/internal/password/feedback.json
      - run: go vet ./...
      - run: go test ./...

  web:
    name: Web (build + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      # `npm install` (not `npm ci`): npm prunes platform-specific optional
      # native binaries (rolldown/rollup) based on the lockfile's generating
      # OS, so `npm ci` on Linux can miss the linux binding. `npm install`
      # re-resolves optionals for the runner's platform.
      - run: npm install
      - run: npm run typecheck --workspace @lockr/web
      - run: npm run build --workspace @lockr/web
