name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: Go CLI (lockr)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Sync shared feedback data
        run: cp packages/core/feedback.json packages/cli-go/internal/password/feedback.json
      - run: go vet ./...
      - run: go test ./...

  web:
    name: Web (build + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Fresh resolve on the runner's platform. The committed package-lock.json
      # is generated on macOS and triggers npm's optional-dependency bug
      # (https://github.com/npm/cli/issues/4828), so the Linux rolldown/rollup
      # native binding is missing under both `npm ci` and `npm install`.
      # Removing the lockfile lets npm install the correct platform binary.
      - run: rm -f package-lock.json && npm install
      - run: npm run typecheck --workspace @lockr/web
      - run: npm run build --workspace @lockr/web
